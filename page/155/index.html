    <article id="post-WEB服务器、网站、域名、IP地址、DNS服务器之间的关系" class="article article-type-post" itemscope itemprop="blogPost">
  <div class="article-meta">
    <a href="/2014/02/16/WEB%E6%9C%8D%E5%8A%A1%E5%99%A8%E3%80%81%E7%BD%91%E7%AB%99%E3%80%81%E5%9F%9F%E5%90%8D%E3%80%81IP%E5%9C%B0%E5%9D%80%E3%80%81DNS%E6%9C%8D%E5%8A%A1%E5%99%A8%E4%B9%8B%E9%97%B4%E7%9A%84%E5%85%B3%E7%B3%BB/" class="article-date">

</a>
    
  <div class="article-category">
    <a class="article-category-link" href="/categories/%E7%BD%91%E7%BB%9C/">网络</a>
  </div>

  </div>
  <div class="article-inner">
    
    
      <header class="article-header">
        
  
    <h1 itemprop="name">
      <a class="article-title" href="/2014/02/16/WEB%E6%9C%8D%E5%8A%A1%E5%99%A8%E3%80%81%E7%BD%91%E7%AB%99%E3%80%81%E5%9F%9F%E5%90%8D%E3%80%81IP%E5%9C%B0%E5%9D%80%E3%80%81DNS%E6%9C%8D%E5%8A%A1%E5%99%A8%E4%B9%8B%E9%97%B4%E7%9A%84%E5%85%B3%E7%B3%BB/">WEB服务器、网站、域名、IP地址、DNS服务器之间的关系</a>
    </h1>
  

      </header>
    
    <div class="article-entry" itemprop="articleBody">
      
        <p>域名首先指向你的服务器，这个过程叫解析。<br>服务器分成好多小块，每小块叫一个空间或者一个虚拟主机。<br>所以当你输入你的域名以后，服务器收到你域名的访问信息，但不知道要打开这么多个小块中的那一个。所以要在你的空间上增加进去你的域名，意思是你这个空间只支持输入你的域名才可以访问，这一过程叫做域名绑定。<br>只有用域名解析到服务器上，才能实现输入域名可以访问到服务器上的效果，只有把域名绑定到空间上。才能实现输入你的域名直接打开你空间的目的。也就是说解析和绑定二者都是必须的。<br>解析是在域名管理后台上做的，绑定域名是在DNS服务器上做的，空间管理后台上一般都有这个功能。</p>

            <a href="/2014/02/16/WEB%E6%9C%8D%E5%8A%A1%E5%99%A8%E3%80%81%E7%BD%91%E7%AB%99%E3%80%81%E5%9F%9F%E5%90%8D%E3%80%81IP%E5%9C%B0%E5%9D%80%E3%80%81DNS%E6%9C%8D%E5%8A%A1%E5%99%A8%E4%B9%8B%E9%97%B4%E7%9A%84%E5%85%B3%E7%B3%BB/#more">Read More</a>

    <article id="post-通过进入单用户模式解决linux中的rc-local修改后无法启动的问题" class="article article-type-post" itemscope itemprop="blogPost">
  <div class="article-meta">
    <a href="/2014/02/11/%E9%80%9A%E8%BF%87%E8%BF%9B%E5%85%A5%E5%8D%95%E7%94%A8%E6%88%B7%E6%A8%A1%E5%BC%8F%E8%A7%A3%E5%86%B3linux%E4%B8%AD%E7%9A%84rc-local%E4%BF%AE%E6%94%B9%E5%90%8E%E6%97%A0%E6%B3%95%E5%90%AF%E5%8A%A8%E7%9A%84%E9%97%AE%E9%A2%98/" class="article-date">
  <time datetime="2014-02-11T14:53:42.000Z" itemprop="datePublished">2014-02-11</time>
</a>
    
  <div class="article-category">
    <a class="article-category-link" href="/categories/linux/">linux</a>
  </div>

  </div>
  <div class="article-inner">
    
    
      <header class="article-header">
        
  
    <h1 itemprop="name">
      <a class="article-title" href="/2014/02/11/%E9%80%9A%E8%BF%87%E8%BF%9B%E5%85%A5%E5%8D%95%E7%94%A8%E6%88%B7%E6%A8%A1%E5%BC%8F%E8%A7%A3%E5%86%B3linux%E4%B8%AD%E7%9A%84rc-local%E4%BF%AE%E6%94%B9%E5%90%8E%E6%97%A0%E6%B3%95%E5%90%AF%E5%8A%A8%E7%9A%84%E9%97%AE%E9%A2%98/">通过进入单用户模式解决linux中的rc.local修改后无法启动的问题</a>
    </h1>
  

      </header>
    
    <div class="article-entry" itemprop="articleBody">
      
        <p>问题：本想将teamviewer这个软件随linux自启动，所以将其启动命令放在rc.local中，但是重启后发现linux启动不起来了，系统前面都是正常启动的,就是无法进入帐户登陆界面,无法输入root帐号密码,不能登陆到系统.</p>
<p>按了ctrl+c,ctrl+z,quit,exit都无效.</p>
<p>解决办法：通过单用户模式进入linux，修改系统配置。</p>
<p>在使用GRUB引导程序的时候如何进入单用户模式?</p>
        
          <p class="article-more-link">
            <a href="/2014/02/11/%E9%80%9A%E8%BF%87%E8%BF%9B%E5%85%A5%E5%8D%95%E7%94%A8%E6%88%B7%E6%A8%A1%E5%BC%8F%E8%A7%A3%E5%86%B3linux%E4%B8%AD%E7%9A%84rc-local%E4%BF%AE%E6%94%B9%E5%90%8E%E6%97%A0%E6%B3%95%E5%90%AF%E5%8A%A8%E7%9A%84%E9%97%AE%E9%A2%98/#more">Read More</a>
          </p>
        
      
    </div>

  <time datetime="2014-01-25T14:16:42.000Z" itemprop="datePublished">2014-01-25</time>
</a>
    
  <div class="article-category">
    <a class="article-category-link" href="/categories/github%E5%8D%9A%E5%AE%A2/">github博客</a>

  </div>
  <div class="article-inner">
    
    
      <header class="article-header">
        
  
    <h1 itemprop="name">
      <a class="article-title" href="/2014/01/25/hexo-tagcloud-%E5%8F%AA%E6%98%BE%E7%A4%BA40%E4%B8%AA/">hexo tagcloud 只显示40个</a>
    </h1>
  

      </header>
    
    <div class="article-entry" itemprop="articleBody">
      
	  

	  
        <p>无意中发现 hexo tagcloud 只显示40个。</p>
<p>找到<br>/usr/local/lib/node_modules/hexo/lib/plugins/helper/tagcloud.js</p>
<p>修改<br>amount: 0, // 0 = unlimited</p>
<pre><code>var defaults = {
  min_font: 10,
  max_font: 20,
  unit: &#39;px&#39;,
  //start_color: &#39;&#39;,
  //end_color: &#39;&#39;,
  //color: false,
  amount: 0, // 0 = unlimited
  orderby: &#39;name&#39;, // name, length, random
  order: 1
  //exclude: []
};</code></pre>
      
    </div>
    <footer class="article-footer">
      <a data-url="http://moqiang02.github.io/2014/01/25/hexo-tagcloud-%E5%8F%AA%E6%98%BE%E7%A4%BA40%E4%B8%AA/" data-id="ckcqdgkvh014j9xlf55nehbuh" class="article-share-link">Share</a>
      
      
    </footer>
  </div>
  
</article>
